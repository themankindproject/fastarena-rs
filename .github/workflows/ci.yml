name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.rust }}-
            ${{ runner.os }}-target-

      - name: Run tests (no features)
        run: cargo test --lib

      - name: Run tests (with drop-tracking)
        run: cargo test --lib --features drop-tracking

      - name: Run integration tests
        run: cargo test --tests

      - name: Run integration tests (with drop-tracking)
        run: cargo test --tests --features drop-tracking

      - name: Build release
        run: cargo build --release

      - name: Build benchmarks
        run: cargo build --release --benches

      - name: Run clippy
        run: cargo clippy --lib -- -D warnings

      - name: Run rustfmt
        run: cargo fmt --all -- --check

  miri:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Miri (no features)
        run: cargo miri test --lib
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-strict-provenance

      - name: Run Miri (with drop-tracking)
        run: cargo miri test --lib --features drop-tracking
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-strict-provenance

      - name: Run Miri integration tests (skip slow/large tests)
        run: cargo miri test --tests -- --skip large_alloc --skip savepoint --skip nested --skip transaction_budget --skip alloc_slice
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-strict-provenance

      - name: Run Miri integration tests with drop-tracking (skip slow/large tests)
        run: cargo miri test --tests --features drop-tracking -- --skip large_alloc --skip savepoint --skip nested --skip transaction_budget --skip alloc_slice
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-strict-provenance

  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

